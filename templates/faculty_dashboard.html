{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Faculty Dashboard</h1>
    <p>Manage attendance and marks for students.</p>
</div>

<div class="dashboard-grid">
    <div class="glass-card">
        <h2>Update Attendance</h2>
        <form action="{{ url_for('add_attendance') }}" method="post">
            <div class="form-group">
                <label>Student</label>
                <select name="student_id" required>
                    {% for s in students %}
                    <option value="{{ s.student_id }}">{{ s.name }} (ID: {{ s.student_id }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status" required>
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Submit Attendance</button>
        </form>
    </div>

    <div class="glass-card">
        <h2>Upload Marks</h2>
        <form action="{{ url_for('add_marks') }}" method="post">
            <div class="form-group">
                <label>Student</label>
                <select name="student_id" required>
                    {% for s in students %}
                    <option value="{{ s.student_id }}">{{ s.name }} (ID: {{ s.student_id }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" required>
            </div>
            <div class="form-group">
                <label>Marks</label>
                <input type="number" name="marks" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Submit Marks</button>
        </form>
    </div>
</div>
{% endblock %}
