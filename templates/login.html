{% extends "base.html" %}

{% block content %}
<div class="login-container">
    <div class="glass-card login-card">
        <h2>Welcome Back</h2>
        <p>Login to your account</p>
        <form action="{{ url_for('login') }}" method="post" class="login-form">
            <div class="form-group">
                <label for="user_type">Login As</label>
                <select name="user_type" id="user_type" required>
                    <option value="admin">Admin</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                </select>
            </div>
            <div class="form-group">
                <label for="username">Username / Email</label>
                <input type="text" name="username" id="username" placeholder="Enter your username or email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-full btn-gradient">Login</button>
        </form>
        <div class="login-hint">
            <small>Hint: admin/admin | akhil@gmail.com/student123 | Dr. Smith/faculty123</small>
        </div>
    </div>
</div>
{% endblock %}
